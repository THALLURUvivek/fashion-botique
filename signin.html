<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - LUXE Fashion Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="preloader" id="preloader">
        <div class="preloader-inner">
            <div class="preloader-ring"></div>
            <div class="preloader-ring"></div>
            <div class="preloader-ring"></div>
            <div class="preloader-logo">
                <img src="images/logo.webp" alt="LUXE" class="preloader-logo-img">
            </div>
            <div class="preloader-counter" id="preloaderCounter">0%</div>
            <div class="preloader-tagline">Redefining Fashion</div>
        </div>
    </div>

    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <button class="menu-toggle" id="menuToggle" data-bs-toggle="offcanvas" data-bs-target="#mobileNavOffcanvas" aria-controls="mobileNavOffcanvas" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo">
                    <a href="index.html"><img src="images/logo.webp" alt="LUXE" class="nav-logo-img"></a>
                </div>
            </div>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="collections.html" class="nav-link">Collections</a>
                    <a href="new-arrivals.html" class="nav-link">New Arrivals</a>
                    <a href="trending.html" class="nav-link">Trending</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Nav Offcanvas -->
    <div class="offcanvas offcanvas-start mobile-nav-offcanvas" tabindex="-1" id="mobileNavOffcanvas" aria-labelledby="mobileNavLabel">
        <div class="offcanvas-header">
            <span class="offcanvas-title drawer-logo" id="mobileNavLabel"><img src="images/logo.webp" alt="LUXE" class="drawer-logo-img"></span>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body mobile-nav-body">
            <nav class="drawer-nav">
                <a href="index.html" class="drawer-link"><i class="fas fa-house"></i><span>Home</span></a>
                <a href="collections.html" class="drawer-link"><i class="fas fa-grid-2"></i><span>Collections</span></a>
                <a href="new-arrivals.html" class="drawer-link"><i class="fas fa-sparkles"></i><span>New Arrivals</span></a>
                <a href="trending.html" class="drawer-link"><i class="fas fa-fire"></i><span>Trending</span></a>
            </nav>
            <div class="drawer-divider"></div>
            <div class="drawer-footer">
                <img src="images/logo.webp" alt="LUXE" class="drawer-footer-logo">
                <span>&copy; 2026 All rights reserved</span>
            </div>
        </div>
    </div>

    <main class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="auth-card" data-animate="fadeUp">
                <div class="auth-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to your LUXE account</p>
                </div>
                <form class="auth-form" id="signinForm">
                    <div class="form-group">
                        <label>Sign in as</label>
                        <div class="role-selector">
                            <button type="button" class="role-btn active" data-role="client">
                                <i class="fas fa-user"></i>
                                <span>Client</span>
                            </button>
                            <button type="button" class="role-btn" data-role="admin">
                                <i class="fas fa-shield-halved"></i>
                                <span>Admin</span>
                            </button>
                        </div>
                        <input type="hidden" id="signinRole" value="client">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                        <span class="field-error" id="emailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="error.html" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full auth-btn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <div class="auth-divider">
                    <span>or</span>
                </div>
                <div class="auth-social">
                    <a href="error.html" class="social-btn google-btn">
                        <i class="fab fa-google"></i>
                        <span>Continue with Google</span>
                    </a>
                    <a href="error.html" class="social-btn facebook-btn">
                        <i class="fab fa-facebook-f"></i>
                        <span>Continue with Facebook</span>
                    </a>
                </div>
                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Create one</a></p>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="auth.js"></script>
    <script>
        const preloader = document.getElementById('preloader');
        const preloaderCounter = document.getElementById('preloaderCounter');
        let count = 0;
        const counterInterval = setInterval(() => {
            count += Math.floor(Math.random() * 15) + 5;
            if (count >= 100) {
                count = 100;
                clearInterval(counterInterval);
                setTimeout(() => preloader.style.opacity = '0', 300);
                setTimeout(() => preloader.style.display = 'none', 600);
            }
            preloaderCounter.textContent = count + '%';
        }, 100);

        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? 'dashboard.html' : 'client-dashboard.html';
        }

        const signinForm = document.getElementById('signinForm');
        const toastContainer = document.getElementById('toastContainer');

        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('signinRole').value = this.dataset.role;
            });
        });

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle') + '"></i><span>' + message + '</span>';
            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showFieldError(input, errorEl, message) {
            input.closest('.input-wrapper').classList.add('error');
            input.closest('.input-wrapper').classList.remove('valid');
            errorEl.textContent = message;
            errorEl.classList.add('visible');
        }

        function clearFieldError(input, errorEl) {
            input.closest('.input-wrapper').classList.remove('error');
            errorEl.classList.remove('visible');
        }

        emailInput.addEventListener('blur', function() {
            const val = this.value.trim();
            if (val && !validateEmail(val)) {
                showFieldError(this, emailError, 'Please enter a valid email address.');
            } else if (val) {
                clearFieldError(this, emailError);
                this.closest('.input-wrapper').classList.add('valid');
            }
        });

        emailInput.addEventListener('input', function() {
            if (this.closest('.input-wrapper').classList.contains('error')) {
                clearFieldError(this, emailError);
            }
        });

        signinForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('signinRole').value;

            if (!email || !password) {
                showToast('Please fill in all fields.', 'error');
                return;
            }
            if (!validateEmail(email)) {
                showFieldError(emailInput, emailError, 'Please enter a valid email address.');
                return;
            }

            const result = Auth.signin(email, password, role);
            if (result.success) {
                const user = Auth.getUser();
                if (user.role !== role) {
                    showToast('This account is registered as ' + user.role + '.', 'error');
                    return;
                }
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => window.location.href = user.role === 'admin' ? 'dashboard.html' : 'client-dashboard.html', 1000);
            } else {
                showToast(result.message, 'error');
            }
        });

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        const scrollAnimations = document.querySelectorAll('[data-animate]');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animated');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        scrollAnimations.forEach(el => observer.observe(el));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
