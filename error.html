<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | LUXE Fashion Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-light);
        }
        .error-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 60px;
            text-align: center;
        }
        .error-inner {
            max-width: 560px;
        }
        .error-code {
            font-family: var(--font-primary);
            font-size: 8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            letter-spacing: 8px;
            opacity: 0.2;
            margin-bottom: -10px;
            user-select: none;
        }
        .error-title {
            font-family: var(--font-primary);
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .error-text {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }
        .error-btn.primary {
            background: var(--primary);
            color: #fff;
        }
        .error-btn.primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .error-btn.secondary {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .error-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }
        .error-illustration {
            margin-bottom: 32px;
        }
        .error-illustration svg {
            width: 180px;
            height: 180px;
        }
        .error-search {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }
        .error-search p {
            color: var(--text-lighter);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .error-search-form {
            display: flex;
            max-width: 380px;
            margin: 0 auto;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
        }
        .error-search-form:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .error-search-form input {
            flex: 1;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: var(--text);
            border: none;
            outline: none;
            background: var(--bg);
            font-family: var(--font-body);
        }
        .error-search-form button {
            padding: 12px 20px;
            background: var(--primary);
            color: #fff;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .error-search-form button:hover {
            background: var(--accent);
        }
        @media (max-width: 576px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.5rem; }
            .error-actions { flex-direction: column; align-items: center; }
            .error-btn { width: 100%; max-width: 280px; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="preloader" id="preloader">
        <div class="preloader-inner">
            <div class="preloader-ring"></div>
            <div class="preloader-ring"></div>
            <div class="preloader-ring"></div>
            <div class="preloader-logo">
                <img src="images/logo.webp" alt="LUXE" class="preloader-logo-img">
            </div>
            <div class="preloader-counter" id="preloaderCounter">0%</div>
            <div class="preloader-tagline">Redefining Fashion</div>
        </div>
    </div>

    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <a href="index.html"><img src="images/logo.webp" alt="LUXE" class="nav-logo-img"></a>
                </div>
            </div>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="collections.html" class="nav-link">Collections</a>
                    <a href="new-arrivals.html" class="nav-link">New Arrivals</a>
                    <a href="trending.html" class="nav-link">Trending</a>
                </div>
                <a href="signin.html" class="auth-nav-btn" aria-label="Account">
                    <i class="fas fa-user"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="error-page">
        <div class="error-content">
            <div class="error-inner" data-animate="fadeUp">
                <div class="error-illustration">
                    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="90" stroke="#c9a87c" stroke-width="2" opacity="0.3"/>
                        <circle cx="100" cy="100" r="70" stroke="#c9a87c" stroke-width="1" opacity="0.15"/>
                        <text x="100" y="115" text-anchor="middle" font-family="Playfair Display, serif" font-size="48" font-weight="700" fill="#c9a87c" opacity="0.8">?</text>
                        <path d="M60 150 Q100 130 140 150" stroke="#c9a87c" stroke-width="2" fill="none" opacity="0.4"/>
                        <circle cx="70" cy="60" r="3" fill="#c9a87c" opacity="0.3"/>
                        <circle cx="140" cy="70" r="2" fill="#c9a87c" opacity="0.2"/>
                        <circle cx="50" cy="120" r="2.5" fill="#c9a87c" opacity="0.25"/>
                        <circle cx="155" cy="130" r="3" fill="#c9a87c" opacity="0.2"/>
                    </svg>
                </div>
                <div class="error-code">404</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-text">The page you're looking for doesn't exist or has been moved. Let's get you back to shopping.</p>
                <div class="error-actions">
                    <a href="index.html" class="error-btn primary">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                    <a href="collections.html" class="error-btn secondary">
                        <i class="fas fa-shopping-bag"></i> Browse Collections
                    </a>
                    <button onclick="history.back()" class="error-btn secondary">
                        <i class="fas fa-arrow-left"></i> Back to Page
                    </button>
                </div>
                <div class="error-search">
                    <p>Or search for what you need:</p>
                    <form class="error-search-form" id="errorSearchForm">
                        <input type="text" placeholder="Search collections..." id="errorSearchInput">
                        <button type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 LUXE Fashion Boutique. All rights reserved.</p>
                    <div class="footer-payment">
                        <i class="fab fa-cc-visa"></i><i class="fab fa-cc-mastercard"></i><i class="fab fa-cc-amex"></i><i class="fab fa-cc-paypal"></i>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const preloader = document.getElementById('preloader');
        const preloaderCounter = document.getElementById('preloaderCounter');
        let count = 0;
        const counterInterval = setInterval(() => {
            count += Math.floor(Math.random() * 15) + 5;
            if (count >= 100) {
                count = 100;
                clearInterval(counterInterval);
                setTimeout(() => preloader.style.opacity = '0', 300);
                setTimeout(() => preloader.style.display = 'none', 600);
            }
            preloaderCounter.textContent = count + '%';
        }, 100);

        document.getElementById('errorSearchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const query = document.getElementById('errorSearchInput').value.trim();
            if (query) {
                window.location.href = 'collections.html';
            }
        });

        const scrollAnimations = document.querySelectorAll('[data-animate]');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animated');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        scrollAnimations.forEach(el => observer.observe(el));
    </script>
</body>
</html>
